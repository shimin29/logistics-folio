<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Contact US</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />

        <!-- google fonts 2 -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet" />
        <style>
           
            #contact {
                background-color: #f8f9fa;
            }

            #contact h2 {
                font-weight: 700;
                color: #333;
            }

            #contact .card {
                border: none;
                border-radius: 12px;
            }

            #contact .form-control {
                border-radius: 8px;
            }

            #contact .btn {
                border-radius: 8px;
            }
            footer a {
                text-decoration: none;
                display: inline-block;
            }

            footer a:hover {
                color: #0d6efd;
                transition: 0.3s;
            }
        </style>
    </head>
    <body>
        <section id="contact" class="container py-5">
            <h2 class="text-center mb-4">Contact Us</h2>

            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm p-4">
                        <form>
                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" placeholder="Enter your name" />
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="Enter your email" />
                            </div>

                            <!-- Subject -->
                            <div class="mb-3">
                                <label class="form-label">Subject</label>
                                <input type="text" class="form-control" placeholder="Enter subject" />
                            </div>

                            <!-- Message -->
                            <div class="mb-3">
                                <label class="form-label">Message</label>
                                <textarea class="form-control" rows="5" placeholder="Write your message here"></textarea>
                            </div>

                            <!-- Button -->
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary px-4">Send Message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
        <footer class="bg-dark text-white pt-4 pb-3 mt-5">
            <div class="container text-center">
                <h5 class="mb-3">High Five Team Logistics</h5>

                <p class="mb-2">Inventory & Logistics Management Project</p>

                <!-- Social icons -->
                <div class="mb-3">
                    <a href="#" class="text-white me-3"><i class="bi bi-whatsapp"></i></a>
                    <a href="#" class="text-white me-3"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-white me-3"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-white"><i class="bi bi-envelope"></i></a>
                </div>

                <hr class="border-light" />

                <p class="mb-0 small">© 2026 All Rights Reserved | Designed by High Five Team</p>
            </div>
        </footer>
    </body>
</html>
